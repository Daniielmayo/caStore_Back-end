services:
  db:
    image: mysql:8.0
    container_name: sgia_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: sgia_dev
      MYSQL_USER: sgia_user
      MYSQL_PASSWORD: Sgia@2026!
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: sgia_backend_api
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    depends_on:
      - db

volumes:
  mysql_data:
